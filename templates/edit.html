<!DOCTYPE html>
<html>
<head>

<title>Edit Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container py-5">

<div class="card-box">

<h1 class="title">
Edit Patient
</h1>

<form method="POST">

<input type="text"
name="full_name"
class="form-control mb-3"
value="{{ patient.full_name }}"
required>

<input type="date"
name="dob"
class="form-control mb-3"
value="{{ patient.dob }}"
required>

<input type="email"
name="email"
class="form-control mb-3"
value="{{ patient.email }}"
required>

<input type="number"
name="glucose"
class="form-control mb-3"
value="{{ patient.glucose }}"
required>

<input type="number"
name="haemoglobin"
class="form-control mb-3"
value="{{ patient.haemoglobin }}"
required>

<input type="number"
name="cholesterol"
class="form-control mb-3"
value="{{ patient.cholesterol }}"
required>

<button class="btn submit-btn w-100">
Update Patient
</button>

</form>

</div>
</div>

</body>
</html>
